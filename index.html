<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Links | Must-Have Items</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 3rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Abstract Background Elements */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(40px);
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(40px);
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6, #ec4899);
            margin-bottom: 1.25rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: pulse-ring 3s infinite alternate;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
            100% { box-shadow: 0 0 0 15px rgba(139, 92, 246, 0); }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-grad-1);
        }

        .profile-name {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-bio {
            font-size: 1rem;
            color: var(--text-muted);
            max-width: 80%;
            line-height: 1.5;
            font-weight: 300;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            text-decoration: none;
            color: var(--text-main);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: all 0.5s ease;
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .link-card:hover::before {
            left: 100%;
        }
        
        /* Staggered animation for links */
        .link-card {
            opacity: 0;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Generating delay for max 20 items */
        .link-card:nth-child(1) { animation-delay: 0.1s; }
        .link-card:nth-child(2) { animation-delay: 0.2s; }
        .link-card:nth-child(3) { animation-delay: 0.3s; }
        .link-card:nth-child(4) { animation-delay: 0.4s; }
        .link-card:nth-child(5) { animation-delay: 0.5s; }
        .link-card:nth-child(n+6) { animation-delay: 0.6s; }


        .link-image-wrapper {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            margin-right: 1.25rem;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .link-card:hover .link-image {
            transform: scale(1.1);
        }

        .link-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .link-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f1f5f9;
        }

        /* Support for multi-line but max 2 lines */
        .link-title {
            white-space: normal;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .link-price {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ef4444; /* Red color for price */
            display: inline-block;
            background: rgba(239, 68, 68, 0.1);
            padding: 3px 8px;
            border-radius: 6px;
            margin-top: 4px;
            width: fit-content;
        }

        .link-icon {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-left: 0.5rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .link-card:hover .link-icon {
            color: var(--text-main);
            transform: translateX(3px);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile Section -->
        <header class="profile-section">
            <div class="avatar-container">
                <!-- Replace with your default avatar or generated one -->
                <img src="https://i.pravatar.cc/300?img=32" alt="Profile Avatar" class="avatar">
            </div>
            <h1 class="profile-name">@KOC_Reviewer</h1>
            <p class="profile-bio">Săn sale sập sàn. Mình review đồ xịn ở đây 👇</p>
        </header>

        <!-- Links Container -->
        <main class="links-container">
            
            <!-- Single Link Card -->
            <a href="https://shopee.vn/Tai-Nghe-Bluetooth5.0-Nh%C3%A9t-Tai-Pro4-Kh%C3%B4ng-D%C3%A2y-TWS-C%C3%B3-Mic-Cho-%C4%90i%E1%BB%87n-Tho%E1%BA%A1i-Gaming-Stereo-i.1490531816.24844737957?aff_siteid=17394170468" target="_blank" rel="noopener noreferrer" class="link-card">
                <div class="link-image-wrapper">
                    <img src="https://placehold.co/100x100?text=Hot+Deal" alt="Tai Nghe Bluetooth5.0 Nhét Tai Pro4 Không Dây TWS Có Mic Cho Điện Thoại Gaming Stereo" class="link-image">
                </div>
                <div class="link-content">
                    <h2 class="link-title">Tai Nghe Bluetooth5.0 Nhét Tai Pro4 Không Dây TWS Có Mic Cho Điện Thoại Gaming Stereo</h2>
                    
                    <span class="link-price" style="color:#10b981; background:rgba(16, 185, 129, 0.1)">Hot Deal 🔥</span>
                    
                </div>
                <div class="link-icon">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
            </a>
            
            
            
        </main>

        <footer>
            <p>Powered by Auto Reup System © 2026</p>
        </footer>
    </div>
</body>
</html>
